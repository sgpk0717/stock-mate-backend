services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockmate-api
    ports:
      - "${PORT:-8007}:8007"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-stockmate}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-stockmate}
      - POSTGRES_DB=${POSTGRES_DB:-stockmate}
      - DEBUG=${DEBUG:-true}
      - USE_SIMULATOR=${USE_SIMULATOR:-false}
      - ZMQ_HOST=host.docker.internal
      - ZMQ_PORT=${ZMQ_PORT:-5555}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite-preview}
      - KIS_APP_KEY=${KIS_APP_KEY:-}
      - KIS_APP_SECRET=${KIS_APP_SECRET:-}
      - KIS_ACCOUNT_NO=${KIS_ACCOUNT_NO:-}
      - DART_API_KEY=${DART_API_KEY:-}
      - WORKFLOW_ENABLED=${WORKFLOW_ENABLED:-false}
      - WORKFLOW_TRADING_MODE=${WORKFLOW_TRADING_MODE:-paper}
      - WORKFLOW_DATA_INTERVAL=${WORKFLOW_DATA_INTERVAL:-5m}
      - MCP_ENABLED=false
      - MCP_SSE_PORT=${MCP_SSE_PORT:-8009}
      - PGM_TRADING_ENABLED=${PGM_TRADING_ENABLED:-false}
      - PGM_TRADING_COLLECT_INTERVAL_MINUTES=${PGM_TRADING_COLLECT_INTERVAL_MINUTES:-5}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - WORKER_MODE=external
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8007 --reload --reload-dir /app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockmate-mcp
    ports:
      - "${MCP_SSE_PORT:-8009}:${MCP_SSE_PORT:-8009}"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-stockmate}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-stockmate}
      - POSTGRES_DB=${POSTGRES_DB:-stockmate}
      - REDIS_URL=redis://redis:6379/0
      - MCP_ENABLED=true
      - MCP_SSE_PORT=${MCP_SSE_PORT:-8009}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - KIS_APP_KEY=${KIS_APP_KEY:-}
      - KIS_APP_SECRET=${KIS_APP_SECRET:-}
      - KIS_ACCOUNT_NO=${KIS_ACCOUNT_NO:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - .:/app
    command: python -m app.mcp.server_standalone
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockmate-worker
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-stockmate}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-stockmate}
      - POSTGRES_DB=${POSTGRES_DB:-stockmate}
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - KIS_APP_KEY=${KIS_APP_KEY:-}
      - KIS_APP_SECRET=${KIS_APP_SECRET:-}
      - KIS_ACCOUNT_NO=${KIS_ACCOUNT_NO:-}
      - WORKER_MODE=worker
      - WORKFLOW_ENABLED=${WORKFLOW_ENABLED:-false}
      - WORKFLOW_TRADING_MODE=${WORKFLOW_TRADING_MODE:-paper}
      - WORKFLOW_DATA_INTERVAL=${WORKFLOW_DATA_INTERVAL:-5m}
      - PGM_TRADING_ENABLED=${PGM_TRADING_ENABLED:-false}
      - DAILY_SCHEDULER_ENABLED=${DAILY_SCHEDULER_ENABLED:-false}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - .:/app
    command: python -m app.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stockmate-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: stockmate-db
    command: postgres -c shared_buffers=2GB -c work_mem=256MB -c effective_cache_size=4GB
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-stockmate}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-stockmate}
      - POSTGRES_DB=${POSTGRES_DB:-stockmate}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockmate} -d ${POSTGRES_DB:-stockmate}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
